<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resist</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .view-node {
            display: none !important;
            width: 100%;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            outline: none;
        }

        .view-node.active {
            display: flex !important;
        }

        .dei-container {
            display: flex;
            gap: 55px;
            will-change: opacity;
        }

        .column {
            text-align: center;
        }

        .main-letter {
            font-size: 80px;
            font-weight: 800;
            color: #b0b0b0;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -1px;
            transition: color 0.2s ease;
        }

        .view-node:hover .main-letter {
            color: #555555;
        }

        @media (max-width: 768px) {
            .dei-container {
                flex-direction: column;
                gap: 20px;
            }
            .main-letter {
                font-size: 55px;
            }
        }
    </style>
</head>
<body>

    <audio id="audio-engine" src="track.mp3" loop preload="auto"></audio>

    <div class="screen-container">
        
        <button id="screen-1" class="view-node active dei-container" onclick="cycle()">
            <div class="column">
                <div class="main-letter">No ICE</div>
            </div>
            <div class="column">
                <div class="main-letter">No War</div>
            </div>
            <div class="column">
                <div class="main-letter">No Kings</div>
            </div>
        </button>

    </div>

    <script>
        var track = document.getElementById("audio-engine");
        var container = document.getElementById("screen-1");
        var activeState = false;
        var fadeWindow = 8;

        function cycle() {
            if (!activeState) {
                track.play().then(function() {
                    activeState = true;
                }).catch(function(err) {
                    console.log("Audio waiting for first interaction.");
                });
            }
        }

        track.addEventListener("timeupdate", function() {
            if (!track.duration) return;
            
            var currentTime = track.currentTime;
            var duration = track.duration;

            if (currentTime < fadeWindow) {
                var progressIn = currentTime / fadeWindow;
                container.style.opacity = progressIn;
            } else if (currentTime > (duration - fadeWindow)) {
                var progressOut = (duration - currentTime) / fadeWindow;
                container.style.opacity = Math.max(0, progressOut);
            } else {
                container.style.opacity = 1;
            }
        });
    </script>

</body>
</html>
